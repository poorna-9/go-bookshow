<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoShow — log in</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrap {
      max-width: 380px;
      margin: 80px auto;
      padding: 0 24px;
    }
    .auth-wrap h1 { color: var(--marquee); margin-bottom: 8px; }
    .auth-wrap .field { margin: 18px 0; }
    .auth-wrap .field label {
      display: block; font-size: 0.8rem; color: var(--ash);
      margin-bottom: 6px; font-family: var(--mono);
    }
    .switch-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--ash); }
  </style>
</head>
<body>

  <main class="auth-wrap">
    <h1>Welcome back</h1>
    <p>Log in to pick your seats and book.</p>

    <div id="alert-slot" style="margin-top:20px;"></div>

    <form id="login-form">
      <div class="field"><label>Email</label><input class="gs-input" type="email" name="email" required></div>
      <div class="field"><label>Password</label><input class="gs-input" type="password" name="password" required></div>
      <button class="btn btn-marquee btn-block" type="submit" style="margin-top:8px;">Log in</button>
    </form>

    <p class="switch-link">New here? <a href="/signup" style="color:var(--marquee);">Create an account</a></p>
  </main>

  <script src="js/api.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      try {
        const result = await apiFetch("/auth/login", {
          method: "POST",
          body: JSON.stringify({ email: form.email.value, password: form.password.value }),
        });
        localStorage.setItem("gs_token", result.token);
        localStorage.setItem("gs_user", JSON.stringify(result.user));
        window.location.href = "/movies";
      } catch (err) {
        document.getElementById("alert-slot").innerHTML =
          `<div class="gs-alert error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
