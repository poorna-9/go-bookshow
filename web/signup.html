<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoShow — sign up</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrap {
      max-width: 380px;
      margin: 60px auto;
      padding: 0 24px;
    }
    .auth-wrap h1 { color: var(--marquee); margin-bottom: 8px; }
    .auth-wrap .field { margin: 18px 0; }
    .auth-wrap .field label {
      display: block; font-size: 0.8rem; color: var(--ash);
      margin-bottom: 6px; font-family: var(--mono);
    }
    .switch-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--ash); }
  </style>
</head>
<body>

  <main class="auth-wrap">
    <h1>Join GoShow</h1>
    <p>Create an account to start booking tickets.</p>

    <div id="alert-slot" style="margin-top:20px;"></div>

    <form id="signup-form">
      <div class="field"><label>Full name</label><input class="gs-input" name="name" required></div>
      <div class="field"><label>Email</label><input class="gs-input" type="email" name="email" required></div>
      <div class="field"><label>Phone</label><input class="gs-input" name="phone"></div>
      <div class="field"><label>Password</label><input class="gs-input" type="password" name="password" minlength="6" required></div>
      <button class="btn btn-marquee btn-block" type="submit" style="margin-top:8px;">Create account</button>
    </form>

    <p class="switch-link">Already have an account? <a href="login.html" style="color:var(--marquee);">Log in</a></p>
  </main>

  <script src="js/api.js"></script>
  <script>
    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      try {
        const result = await apiFetch("/auth/signup", {
          method: "POST",
          body: JSON.stringify({
            name: form.name.value,
            email: form.email.value,
            phone: form.phone.value,
            password: form.password.value,
          }),
        });
        localStorage.setItem("gs_token", result.token);
        localStorage.setItem("gs_user", JSON.stringify(result.user));
        window.location.href = "movies.html";
      } catch (err) {
        document.getElementById("alert-slot").innerHTML =
          `<div class="gs-alert error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
