<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoShow — choose your city</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero {
      min-height: calc(100vh - 70px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .hero h1 { color: var(--marquee); }
    .hero p { max-width: 420px; margin: 14px 0 36px; }
    .city-form {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }
  </style>
</head>
<body>

  <main class="hero">
    <h1>Lights down.<br>Curtain up.</h1>
    <p>Pick your city and we'll show you what's playing near you tonight.</p>

    <form class="city-form" id="city-form">
      <select class="gs-select" id="city-select" required>
        <option value="" disabled selected>Choose a city</option>
        <option>Bengaluru</option>
        <option>Mumbai</option>
        <option>Delhi NCR</option>
        <option>Hyderabad</option>
        <option>Chennai</option>
        <option>Pune</option>
        <option>Kolkata</option>
      </select>
      <button type="submit" class="btn btn-marquee">Go</button>
    </form>
  </main>

  <script src="js/api.js"></script>
  <script>
    document.getElementById("city-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const city = document.getElementById("city-select").value;
      localStorage.setItem("gs_city", city);
      window.location.href = "/movies";
    });
  </script>
</body>
</html>
