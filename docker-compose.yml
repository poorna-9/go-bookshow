services:
  postgres:
    image: postgres:16-alpine
    container_name: bookmyshow-postgres
    environment:
      POSTGRES_USER: goshow
      POSTGRES_PASSWORD: goshow
      POSTGRES_DB: goshow
    ports:
      - "5432:5432"
    volumes:
      - bookmyshow_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bookmyshow-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: bookmyshow-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./web:/app/web

  nginx:
    image: nginx:1.27-alpine
    container_name: bookmyshow-nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/app/web:ro

    depends_on:
      - app

volumes:
  bookmyshow_pgdata:
  redis_data: