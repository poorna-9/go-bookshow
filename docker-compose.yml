services:
  postgres:
    image: postgres:16-alpine
    container_name: goshow-postgres
    environment:
      POSTGRES_USER: goshow
      POSTGRES_PASSWORD: goshow
      POSTGRES_DB: goshow
    ports:
      - "5432:5432"
    volumes:
      - goshow_pgdata:/var/lib/postgresql/data
  redis:
    image : redis:7-alpine
    container_name: goshow-redis
    ports:
     - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
    - redis_data:/data


volumes:
  goshow_pgdata:
  redis_data: