# "upstream" names a group of servers nginx can proxy to. Here it's just
# one — your Go app container, reachable at "app:8000" once it's in
# docker-compose.yml. Naming it lets you reuse "app" below instead of
# repeating the address everywhere (and swap in multiple instances later
# for load balancing, if you ever need it).
upstream app {
    server app:8080;
}

server {
    listen 80;

    client_max_body_size 20M;

    # Static assets — nginx serves these directly from disk, never
    # touching your Go app. Much faster than round-tripping through Go
    # for a CSS/JS/image file.
    location /css/ {
        alias /app/web/css/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        alias /app/web/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        alias /app/web/js/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else (your HTML pages, API routes, webhooks) gets
    # forwarded to the Go app.
    location / {
        proxy_pass http://app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 60s;
    }
}

# --- Later, once you have a domain again (like cricstore.ddns.net) ---
# 1. Add a second server{} block listening on 443 ssl with your
#    ssl_certificate / ssl_certificate_key paths.
# 2. Add server_name yourdomain.com to both blocks.
# 3. Turn this block's "listen 80" into a redirect:
#      return 301 https://$host$request_uri;
#    so plain HTTP always bounces to HTTPS, same pattern as your
#    Django nginx.conf.